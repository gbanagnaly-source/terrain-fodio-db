services:
  # Web Service - Application Next.js
  - type: web
    name: fodio-terrain
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    healthCheckPath: /
    branch: main
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fodio-terrain-db
          property: connectionString
      - key: DIRECT_DATABASE_URL
        fromDatabase:
          name: fodio-terrain-db
          property: connectionString

# Base de données PostgreSQL
databases:
  - name: fodio-terrain-db
    region: frankfurt
    plan: free
